# Terraform Provider release workflow. Triggered by pushing a semver tag (vX.Y.Z).
# Builds and GPG-signs the cross-platform artifacts with GoReleaser and publishes
# them as a GitHub release in the format the Terraform Registry ingests.
name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  goreleaser:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: 'go.mod'
          cache: true

      - name: Import GPG key
        uses: crazy-max/ghaction-import-gpg@v6
        id: import_gpg
        with:
          # The unprotected private key (ASCII-armored) is stored as a repo secret.
          gpg_private_key: ${{ secrets.GPG_PRIVATE_KEY }}
          # No passphrase: the signing key was generated without one. The secret may
          # be omitted (resolves to empty) for an unprotected key.
          passphrase: ${{ secrets.PASSPHRASE }}

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          args: release --clean
          version: '~> v2'
        env:
          GPG_FINGERPRINT: ${{ steps.import_gpg.outputs.fingerprint }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
